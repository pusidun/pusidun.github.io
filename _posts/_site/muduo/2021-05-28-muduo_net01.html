<h2 id="tcp网络编程最本质的事是处理三个半事件">TCP网络编程最本质的事是处理三个半事件</h2>

<ul>
  <li>连接建立：服务端accept（被动）接受连接，客户端connect（主动）发起连接</li>
  <li>连接断开：主动断开（close，shutdown），被动断开（read返回0）</li>
  <li>消息到达：文件描述符可读</li>
  <li>消息发送完毕：算半个。对于低流量服务，可不必关心这个事件；这里的发送完毕指数据写入OS发送缓冲区，不代表对方已经接收到数据</li>
</ul>
