<aside class="sidebar">
  <div class="sidebar-card sidebar-card--profile">
    <div class="sidebar-avatar">
      <img src="/images/avatar.jpg" alt="{{ site.title }}">
    </div>
    <div class="sidebar-social">
      {% if site.social.github %}
        <a href="https://github.com/{{ site.social.github }}" title="GitHub" target="_blank">
          <img src="/images/github.png" alt="GitHub" width="20">
        </a>
      {% endif %}
      {% if site.social.mail %}
        <a href="mailto:{{ site.social.mail }}" title="Email">
          <img src="/images/email.png" alt="Email" width="20">
        </a>
      {% endif %}
      <a href="/feed.xml" title="RSS" target="_blank">
        <img src="/images/rss.png" alt="RSS" width="20">
      </a>
    </div>
    <div class="sidebar-name">{{ site.avatarTitle }}</div>
    <div class="sidebar-desc">{{ site.avatarDesc }}</div>
  </div>

  <div class="sidebar-card sidebar-card--tags">
    <div class="sidebar-card-title">标签分类</div>
    <div class="sidebar-tags-list">
      {% for tag in site.tags %}
        <a href="/tags#{{ tag[0] }}-ref" class="sidebar-tag-item">
          <span class="sidebar-tag-name">{{ tag[0] }}</span>
          <span class="sidebar-tag-count">{{ tag[1].size }}</span>
        </a>
      {% endfor %}
    </div>
  </div>
</aside>
