<footer class="site-footer">
  <div class="site-footer__inner">
    <div class="footer-social">
      {% if site.social.github %}
      <a href="https://github.com/{{ site.social.github }}" title="GitHub" target="_blank">
        <img src="/images/github.png" alt="GitHub" width="20">
      </a>
      {% endif %}
      {% if site.social.mail %}
      <a href="mailto:{{ site.social.mail }}" title="Email">
        <img src="/images/email.png" alt="Email" width="20">
      </a>
      {% endif %}
      <a href="/feed.xml" title="RSS" target="_blank">
        <img src="/images/rss.png" alt="RSS" width="20">
      </a>
    </div>
    <p class="footer-copyright">
      Copyright &copy; {{ site.title }} {{ site.time | date: '%Y' }}
    </p>
    <div class="footer-stats">
      <span id="busuanzi_container_site_pv">
        本站总访问量 <span id="busuanzi_value_site_pv"></span>次
      </span>
    </div>
  </div>
</footer>
